# Fly.io deployment. performance-1x reads expensive (~$31/mo sticker) but with
# auto_stop_machines = 'suspend' billing is per-second-while-running, and these apps sleep
# most of the day — real cost at friends scale is a few dollars/month per app plus the volume.
# Why not shared-cpu-1x (~$2–3/mo flat): shared vCPUs get a 6.25% baseline with a small burst
# budget (5s on a fresh machine — and every deploy makes a fresh machine), while this app's
# workload is bursty DDS solving exactly when someone is playing: robot card play plus the
# benchmark AI personas (server/src/ai-players.ts). Measured on a throttled preview, taps took
# seconds and health checks failed; a dedicated core keeps play latency in the tens of ms.
#
# This one file is shared by every environment: production, the permanent demo app, and every
# per-PR preview app (see .github/workflows/ci.yml and pr-preview-teardown.yml).
# `app = 'nickel-bridge'` below is only the default for local/manual `fly deploy` — CI always
# passes `--app <name>` explicitly (`nickel-bridge` for production, `nickel-bridge-demo` for
# the demo app at demo.bridge.brannon.online, `nickel-bridge-pr-<number>` for previews),
# which overrides it.
#
# One-time production setup (see README.md "Deployment" for the full checklist):
#   fly apps create nickel-bridge
#   fly volumes create data --app nickel-bridge --region ewr --size 5
#   fly certs add bridge.brannon.online --app nickel-bridge   (+ a DNS-only CNAME bridge → nickel-bridge.fly.dev)
#   fly secrets set GOOGLE_CLIENT_ID=... GOOGLE_CLIENT_SECRET=... BASE_URL=https://bridge.brannon.online --app nickel-bridge
#
# SQLite lives on the volume; keep exactly one machine per app (no horizontal scaling). Preview
# and demo apps get a small 1GB volume (see ci.yml) since their data is throwaway; the
# auto-extend settings below apply to every environment but only kick in once actually needed.
app = 'nickel-bridge'
primary_region = 'ewr'

[build]

[env]
  PORT = '3000'
  DB_PATH = '/data/bridge.db'

[mounts]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '20GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = '10s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  size = 'performance-1x'
  memory = '2gb'

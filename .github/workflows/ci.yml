name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t bridge-bot:ci .

  # Deploys a throwaway Fly.io app per open PR (bridge-bot-pr-<number>) so a change can be
  # reviewed live at a URL instead of run locally. Uses DEV_AUTH (name-only login) instead of
  # Google OAuth, since OAuth needs a pre-registered redirect URI and preview URLs are per-PR.
  # Never enable DEV_AUTH on the production app (see .claude/CLAUDE.md invariant #5).
  # Torn down by pr-preview-teardown.yml when the PR closes.
  deploy-preview:
    needs: [test, e2e, docker]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: bridge-bot-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure preview app + volume exist
        run: |
          flyctl apps create "$APP" --org personal || true
          count=$(flyctl volumes list --app "$APP" --json 2>/dev/null | jq 'length' 2>/dev/null || echo 0)
          if [ "$count" -eq 0 ]; then
            flyctl volumes create data --app "$APP" --region ewr --size 1 --yes
          fi
          flyctl secrets set DEV_AUTH=1 BASE_URL="https://$APP.fly.dev" --app "$APP"
      - name: Deploy preview
        run: flyctl deploy --app "$APP" --config fly.toml --remote-only --ha=false
      - name: Comment preview URL on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            🚀 Preview deployed: https://${{ env.APP }}.fly.dev

            Log in with any name — dev auth is enabled on preview apps only, no Google account needed.

  # Auto-deploys every merge to main. Assumes the production Fly app/volume/secrets already
  # exist (see README.md "Deployment" — one-time manual setup, not done by this workflow).
  deploy-production:
    needs: [test, e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bridge-bot --config fly.toml --remote-only --ha=false

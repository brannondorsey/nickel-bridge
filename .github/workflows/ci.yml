name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nickel-bridge:ci .

  # Deploys a throwaway Fly.io app per open PR (nickel-bridge-pr-<number>) so a change can be
  # reviewed live at a URL instead of run locally. Uses DEV_AUTH (name-only login) instead of
  # Google OAuth, since OAuth needs a pre-registered redirect URI and preview URLs are per-PR.
  # Never enable DEV_AUTH on the production app (see .claude/CLAUDE.md invariant #5); the
  # permanent demo app (deploy-demo below) intentionally shares this DEV_AUTH+DEMO shape.
  # Torn down by pr-preview-teardown.yml when the PR closes.
  deploy-preview:
    needs: [test, e2e, docker]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: nickel-bridge-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure preview app + volume exist
        run: |
          flyctl apps create "$APP" --org personal || true
          count=$(flyctl volumes list --app "$APP" --json 2>/dev/null | jq 'length' 2>/dev/null)
          count=${count:-0}
          if [ "$count" -eq 0 ]; then
            flyctl volumes create data --app "$APP" --region ewr --size 1 --yes
          fi
          flyctl secrets set DEV_AUTH=1 DEMO=1 BASE_URL="https://$APP.fly.dev" --app "$APP"
      - name: Deploy preview
        run: flyctl deploy --app "$APP" --config fly.toml --remote-only --ha=false
      - name: Comment preview URL on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            🚀 Preview deployed: https://${{ env.APP }}.fly.dev

            **Demo tour:** https://${{ env.APP }}.fly.dev/demo — opens the scenario gallery already signed in as Inspector; jump straight into prepared game states for click-testing.

            Or log in with any name — dev auth is enabled on preview apps only, no Google account needed.

  # Keeps the single permanent demo instance (nickel-bridge-demo, demo.bridge.brannon.online)
  # in lockstep with production code on every push to main. Same DEMO/DEV_AUTH shape as PR
  # previews — it is deliberately NOT production, so invariant 5 (which is scoped to the
  # production app) does not apply here. Unlike previews it never gets torn down: it's a
  # stable URL for automation and human click-testers. Self-provisioning and idempotent,
  # except the one-time cert + DNS setup documented in README.md "Deployment".
  deploy-demo:
    needs: [test, e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-demo
      cancel-in-progress: true
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: nickel-bridge-demo
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure demo app + volume exist
        run: |
          flyctl apps create "$APP" --org personal || true
          count=$(flyctl volumes list --app "$APP" --json 2>/dev/null | jq 'length' 2>/dev/null)
          count=${count:-0}
          if [ "$count" -eq 0 ]; then
            flyctl volumes create data --app "$APP" --region ewr --size 1 --yes
          fi
          flyctl secrets set DEV_AUTH=1 DEMO=1 BASE_URL="https://demo.bridge.brannon.online" --app "$APP"
      - name: Deploy demo
        run: flyctl deploy --app "$APP" --config fly.toml --remote-only --ha=false

  # Auto-deploys every merge to main. Assumes the production Fly app/volume/secrets already
  # exist (see README.md "Deployment" — one-time manual setup, not done by this workflow).
  deploy-production:
    needs: [test, e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Enforce CLAUDE.md invariant 5: DEV_AUTH (unauthenticated login) and
      # DEMO (auto-login + data reset) must never reach production. Fails the
      # deploy if either secret is set on the production app.
      - name: Refuse to deploy with demo/dev secrets set
        # Fail CLOSED: capturing into a variable makes a flyctl failure fail
        # the step (default shell is bash -e), instead of a broken listing
        # reading as "no forbidden secrets" and waving the deploy through.
        run: |
          secrets=$(flyctl secrets list --app nickel-bridge)
          if echo "$secrets" | grep -qE '^\s*(DEV_AUTH|DEMO)\s'; then
            echo "::error::DEV_AUTH/DEMO secret found on the production app — remove it before deploying"
            exit 1
          fi
      - run: flyctl deploy --app nickel-bridge --config fly.toml --remote-only --ha=false

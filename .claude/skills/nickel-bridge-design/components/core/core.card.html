<!-- @dsCard group="Components" viewport="700x420" subtitle="Buttons, chips, forms, dialog, toast — fill-ins styled to system" name="Core controls" -->
<link rel="stylesheet" href="../../styles.css">
<script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:#fff;padding:18px 22px}</style>
<div id="root"></div>
<script type="text/babel">
const NS = window.NickelBridge || window.DS || {};
const { Button, Chip, Input, Select, Checkbox, Radio, Switch, Toast, InkStamp } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:'16px 26px',alignItems:'start'}}>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <Button>CONTINUE THE CROSSING →</Button>
      <Button variant="secondary">Review the boards</Button>
      <Button disabled>SEALED</Button>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
        <Chip>6–9 HCP</Chip><Chip>NO 4-CARD MAJOR</Chip><Chip quiet>DENIES 3 HEARTS</Chip><Chip color="var(--suit-h)">NS VUL</Chip>
      </div>
      <Toast stamp={<InkStamp size={9}>★★</InkStamp>} style={{marginTop:4}}>2♥ — Good. AI preferred 3♥.</Toast>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Input label="Your name" placeholder="Margaret"/>
      <Select label="Scoring" options={['Matchpoints','IMPs']}/>
      <div style={{display:'flex',gap:24,alignItems:'center'}}>
        <Checkbox label="SAYC hints" defaultChecked/>
        <Switch label="Sound" defaultChecked/>
      </div>
      <Radio options={['Open seating','Assigned pairs']} defaultValue="Open seating"/>
    </div>
  </div>
);
</script>

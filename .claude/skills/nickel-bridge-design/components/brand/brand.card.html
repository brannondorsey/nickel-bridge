<!-- @dsCard group="Components" viewport="700x360" subtitle="Ticket, flip digits, stamps, postmark, perforated panel, marks" name="Brand vocabulary" -->
<link rel="stylesheet" href="../../styles.css">
<script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:#fff;padding:18px 22px}</style>
<div id="root"></div>
<script type="text/babel">
const NS = window.NickelBridge || window.DS || {};
const { TicketStub, FlipDigits, InkStamp, Postmark, PerforatedPanel, BridgeMark } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{display:'flex',flexDirection:'column',gap:18}}>
    <div style={{display:'flex',gap:22,alignItems:'center',flexWrap:'wrap'}}>
      <TicketStub width={150}/>
      <FlipDigits value="58" suffix="%"/>
      <InkStamp color="var(--suit-h)" rotate={3} fade="left">LIVE</InkStamp>
      <InkStamp>SCORED</InkStamp>
      <BridgeMark width={40}/>
    </div>
    <div style={{display:'flex',gap:22,alignItems:'flex-start',flexWrap:'wrap'}}>
      <Postmark size={104} arcBottom="TOURNAMENT Nº12" line1="TOLL PAID"/>
      <PerforatedPanel heading="THE FIELD — AFTER BOARD 1" style={{width:220,fontFamily:'var(--font-body)',fontSize:14}}>
        <div style={{display:'flex',justifyContent:'space-between'}}><span>Alice</span><b>83%</b></div>
        <div style={{display:'flex',justifyContent:'space-between',background:'var(--surface)',margin:'0 -6px',padding:'0 6px'}}><b>You</b><b>58%</b></div>
        <div style={{display:'flex',justifyContent:'space-between'}}><span>Bob</span><b>33%</b></div>
      </PerforatedPanel>
      <PerforatedPanel dashed style={{width:150,fontFamily:'var(--font-body)',fontSize:13,fontStyle:'italic'}}>Sealed — opens when you finish #12</PerforatedPanel>
    </div>
  </div>
);
</script>
